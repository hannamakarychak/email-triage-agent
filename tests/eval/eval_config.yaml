metrics_to_run:
  - routing_accuracy
  - mathematical_priority

custom_metrics:
  - name: routing_accuracy
    custom_function: |
      def evaluate(instance):
          # Extract the final action string from the agent
          response = instance.get("response", {}).get("parts", [{}])[0].get("text", "").lower()
          prompt = instance.get("prompt", {}).get("parts", [{}])[0].get("text", "").lower()
          
          score = 5
          explanation = "Routed correctly."
          
          # Check expected routing based on tags in the prompt
          if "[FINANCE]" in prompt and "finance" not in response:
              score = 1; explanation = "Failed to route to finance."
          elif "[SALES]" in prompt and "sales" not in response:
              score = 1; explanation = "Failed to route to sales."
          elif "[TECH]" in prompt and "technical_issues" not in response:
              score = 1; explanation = "Failed to route to technical_issues."
          elif "[SATISFACTION]" in prompt and "customer_satisfaction" not in response:
              score = 1; explanation = "Failed to route to customer_satisfaction."
                  
          return {"score": score, "explanation": explanation}

  - name: mathematical_priority
    custom_function: |
      def evaluate(instance):
          response = instance.get("response", {}).get("parts", [{}])[0].get("text", "").lower()
          prompt = instance.get("prompt", {}).get("parts", [{}])[0].get("text", "").lower()
          
          if "[CHURN]" in prompt:
              if "priority: " in response:
                  score_str = response.split("priority: ")[1].split(".")[0]
                  if int(score_str) > 100:
                      return {"score": 5, "explanation": f"Priority > 100 ({score_str})"}
                  return {"score": 1, "explanation": "Priority too low for churn risk"}
          
          return {"score": 5, "explanation": "Priority scored."}
